id: workflow_fast_no_cloning_screen
slug: fast-no-cloning-screen
name: Fast no-cloning screen
workflow_family: fast_screen
objective: Fast first-pass feasibility test for a known sequence or small design set
throughput_class: low
recommended_for:
  - quick feasibility screens
  - host-toxicity-risky candidates
  - early triage before larger build campaigns
default_parallelization_assumption: >
  Candidate design can happen while ordering decisions are being finalized, but
  DNA acquisition remains the dominant serial dependency.
stage_templates:
  - stage_name: broad first-pass screen
    stage_kind: broad_screen
    stage_order: 1
    search_modality: cell_free
    input_candidate_count_typical: 8
    output_candidate_count_typical: 2
    candidate_unit: candidate designs
    selection_basis: measurable signal in a rapid assay with acceptable background
    enriches_for_axes:
      - time to first signal
      - basic functional activity
    guards_against_axes:
      - spending cloning time on clearly weak designs
      - early host-specific confounding
    advance_criteria: clear stimulated-versus-baseline separation in the first-pass assay
    bottleneck_risk: DNA acquisition still dominates the calendar even in a fast screen
  - stage_name: go or no-go decision
    stage_kind: decision_gate
    stage_order: 2
    search_modality: cell_based
    input_candidate_count_typical: 2
    output_candidate_count_typical: 1
    candidate_unit: shortlisted designs
    selection_basis: whether the first-pass hit is strong enough to justify a slower host-context loop
    preserves_downstream_property_axes:
      - downstream build capacity
      - host-context follow-up bandwidth
    advance_criteria: only carry forward designs that justify a more realistic validation loop
step_templates:
  - step_name: design candidate
    stage_name: broad first-pass screen
    step_type: design
    duration_typical_hours: 4
    queue_time_typical_hours: 0
    hands_on_hours: 4
    direct_cost_usd_typical: 0
    parallelizable: true
  - step_name: order DNA fragment
    stage_name: broad first-pass screen
    step_type: dna_acquisition
    duration_typical_hours: 72
    queue_time_typical_hours: 0
    hands_on_hours: 0.5
    direct_cost_usd_typical: 100
    outsourced: true
    parallelizable: false
  - step_name: fast expression or assay
    stage_name: broad first-pass screen
    step_type: assay
    duration_typical_hours: 3
    queue_time_typical_hours: 0.5
    hands_on_hours: 2
    direct_cost_usd_typical: 50
    parallelizable: true
  - step_name: analyze and decide
    stage_name: go or no-go decision
    step_type: decision
    duration_typical_hours: 2
    queue_time_typical_hours: 0
    hands_on_hours: 2
    direct_cost_usd_typical: 0
    parallelizable: false
assumption_notes:
  - Timing values are phase-0 seed assumptions and should be replaced with sourced workflow assumptions.
  - DNA acquisition is the dominant clock time in this archetype.
